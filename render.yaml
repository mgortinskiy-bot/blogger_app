# Blueprint для Render: New → Blueprint → подключить репозиторий.
# ВАЖНО: в GitHub залит сам проект (без папки proekt-hayp сверху), поэтому rootDir не нужен.

databases:
  - name: hayp-postgres
    databaseName: hayp
    user: hayp
    plan: free

services:
  - type: web
    name: proekt-hayp
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT app:app
    healthCheckPath: /
    envVars:
      # Зафиксировать Python, чтобы Render не взял дефолт 3.14+
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DATABASE_URL
        fromDatabase:
          name: hayp-postgres
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
