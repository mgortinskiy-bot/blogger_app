{% extends "base.html" %}
{% block title %}Восстановление пароля — Проект Хайп{% endblock %}
{% block content %}
<section class="hero" style="padding-top:2rem;">
  <h1>Восстановление пароля</h1>
  <p class="hero-lead">На ваш email придёт ссылка для сброса. Убедитесь, что на сервере заданы SMTP-переменные окружения.</p>
</section>
<div class="card" style="max-width:480px;margin:0 auto;">
  <form class="form" method="post">
    <div>
      <label for="email">Email</label>
      <input id="email" name="email" type="email" required autocomplete="email">
    </div>
    <button class="btn btn-primary" type="submit">Отправить ссылку</button>
  </form>
</div>
{% endblock %}
