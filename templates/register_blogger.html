{% extends "base.html" %}
{% block title %}Регистрация блогера — Проект Хайп{% endblock %}
{% block content %}
<section class="hero" style="padding-top:2rem;">
  <h1>Регистрация блогера</h1>
  <p class="hero-lead">Укажите email и пароль. Восстановление доступно по ссылке на почту (при настроенном SMTP).</p>
</section>
<div class="card" style="max-width:480px;margin:0 auto;">
  <form class="form" method="post">
    <div>
      <label for="email">Email</label>
      <input id="email" name="email" type="email" required autocomplete="email">
    </div>
    <div>
      <label for="password">Пароль</label>
      <input id="password" name="password" type="password" required minlength="6" autocomplete="new-password">
    </div>
    <div>
      <label for="password2">Пароль ещё раз</label>
      <input id="password2" name="password2" type="password" required minlength="6" autocomplete="new-password">
    </div>
    <button class="btn btn-primary" type="submit">Создать аккаунт</button>
  </form>
</div>
{% endblock %}
