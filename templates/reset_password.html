{% extends "base.html" %}
{% block title %}Новый пароль — Проект Хайп{% endblock %}
{% block content %}
<section class="hero" style="padding-top:2rem;">
  <h1>Новый пароль</h1>
</section>
<div class="card" style="max-width:480px;margin:0 auto;">
  <form class="form" method="post" action="{{ url_for('reset_password', token=token) }}">
    <div>
      <label for="password">Новый пароль</label>
      <input id="password" name="password" type="password" required minlength="6" autocomplete="new-password">
    </div>
    <div>
      <label for="password2">Повтор</label>
      <input id="password2" name="password2" type="password" required minlength="6" autocomplete="new-password">
    </div>
    <button class="btn btn-primary" type="submit">Сохранить</button>
  </form>
</div>
{% endblock %}
